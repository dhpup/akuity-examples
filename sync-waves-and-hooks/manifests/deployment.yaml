apiVersion: apps/v1
kind: Deployment
metadata:
  name: whoami
  annotations:
    # Wave 0: applied after the ConfigMap (wave -1) is in place.
    argocd.argoproj.io/sync-wave: "0"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: whoami
  template:
    metadata:
      labels:
        app: whoami
    spec:
      containers:
      - name: whoami
        image: traefik/whoami:v1.10.2
        ports:
        - containerPort: 80
        envFrom:
        - configMapRef:
            name: app-config
