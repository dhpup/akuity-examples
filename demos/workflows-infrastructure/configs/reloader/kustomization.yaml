apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Inflate the upstream Stakater Reloader chart. Requires the Argo CD instance
# to have `kustomize.buildOptions: --enable-helm`.
helmCharts:
- name: reloader
  repo: https://stakater.github.io/stakater-charts
  version: 2.2.14
  releaseName: reloader
  namespace: reloader
  valuesFile: values.yaml
