apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Inflate the upstream Argo Events chart (controller + CRDs), then layer our
# own event-driven resources on top. Requires the Argo CD instance to have
# `kustomize.buildOptions: --enable-helm`.
helmCharts:
- name: argo-events
  repo: https://argoproj.github.io/argo-helm
  version: 2.4.23           # app v1.9.11
  releaseName: argo-events
  namespace: argo-events
  includeCRDs: true
  valuesFile: values.yaml

# Our own Argo Events objects — the actual example content this demo teaches.
resources:
- operate-workflows-sa.yaml
- eventbus.yaml
- github-webhook-source.yaml
- github-webhook-sensor.yaml
