apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Inflate the upstream Argo Workflows chart (Helm for packaging/templating),
# then layer our own resources on top with kustomize. Requires the Argo CD
# instance to have `kustomize.buildOptions: --enable-helm`.
helmCharts:
- name: argo-workflows
  repo: https://argoproj.github.io/argo-helm
  version: 1.0.20            # app v4.0.7
  releaseName: argo-workflows
  namespace: argo
  includeCRDs: true
  valuesFile: values.yaml

# Last-mile additions kustomize layers on top of the chart output.
resources:
- rbac.yaml
