apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Inflate the upstream Argo Rollouts chart. Requires the Argo CD instance to
# have `kustomize.buildOptions: --enable-helm`.
helmCharts:
- name: argo-rollouts
  repo: https://argoproj.github.io/argo-helm
  version: 2.41.1           # app v1.9.1
  releaseName: argo-rollouts
  namespace: argo-rollouts
  includeCRDs: true
  valuesFile: values.yaml
