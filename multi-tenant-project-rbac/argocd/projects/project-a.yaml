apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: project-a
  namespace: argocd
  finalizers:
  - resources-finalizer.argocd.argoproj.io
spec:
  description: Tenant A — least-privilege project scoped to its own repo, cluster, namespace and resource kinds.

  # Only this repo may be deployed by tenant A.
  sourceRepos:
  - https://github.com/dhpup/guestbook-deploy.git

  # Tenant A may deploy only to its own namespace on the local cluster.
  destinations:
  - name: in-cluster
    namespace: guestbook-a

  # Tenants may not manage cluster-scoped resources, except creating their own
  # namespace (needed by the CreateNamespace=true sync option).
  clusterResourceWhitelist:
  - group: ''
    kind: Namespace

  # Restrict namespaced resources to exactly the kinds the guestbook renders.
  namespaceResourceWhitelist:
  - group: ''
    kind: Service
  - group: apps
    kind: Deployment
  - group: networking.k8s.io
    kind: Ingress

  # RBAC: this role can only view/sync applications within project-a.
  roles:
  - name: project-a-role
    policies:
      - p, proj:project-a:project-a-role, applications, get, project-a/*, allow
      - p, proj:project-a:project-a-role, applications, sync, project-a/*, allow
    groups:
      - example-group-a
