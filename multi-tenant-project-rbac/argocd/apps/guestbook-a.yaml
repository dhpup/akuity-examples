apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: guestbook-a
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  project: project-a
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
  sources:
  - repoURL: https://github.com/dhpup/guestbook-deploy.git
    targetRevision: HEAD
    path: env/dev
  destination:
    name: in-cluster
    namespace: guestbook-a
