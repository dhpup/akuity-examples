apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: example-progressive-syncs
  namespace: argocd
spec:
  project: default
  # Manual sync: deploys only when you choose to sync it from the UI.
  source:
    repoURL: https://github.com/dhpup/akuity-examples.git
    targetRevision: main
    path: progressive-syncs/argocd
    directory:
      recurse: true
  destination:
    name: in-cluster
    namespace: argocd
