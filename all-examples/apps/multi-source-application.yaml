apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: example-multi-source-application
  namespace: argocd
spec:
  project: default
  # Manual sync: deploys only when you choose to sync it from the UI.
  syncPolicy:
    syncOptions:
    - CreateNamespace=true
  # Mirrors multi-source-application/application.yaml (upstream podinfo chart
  # configured by a values file from this repo via the $values ref).
  sources:
  - repoURL: https://stefanprodan.github.io/podinfo
    chart: podinfo
    targetRevision: 6.14.0
    helm:
      valueFiles:
      - $values/multi-source-application/values/podinfo-values.yaml
  - repoURL: https://github.com/dhpup/akuity-examples.git
    targetRevision: main
    ref: values
  destination:
    name: in-cluster
    namespace: podinfo
