apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: app-of-apps-git-directory-multicluster-generator
spec:
  # Bootstrap app-of-apps runs in the built-in `default` project; it deploys the
  # `git-directory-generator-demo` AppProject (below, in argocd/) used by the
  # generated apps.
  project: default
  syncPolicy:
    automated: {}
  source:
    repoURL: https://github.com/dhpup/akuity-examples.git
    targetRevision: main
    path: git-directory-multicluster-generator/argocd
    directory:
      recurse: true
  destination:
    name: in-cluster
    namespace: argocd
