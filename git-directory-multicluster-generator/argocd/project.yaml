apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: git-directory-generator-demo
  namespace: argocd
  finalizers:
  - resources-finalizer.argocd.argoproj.io
spec:
  description: Home for apps generated from the git directory generator across clusters.
  sourceRepos:
  - https://github.com/dhpup/akuity-examples.git
  # This example fans out per configs/<app>/<cluster> folder. It ships targeting
  # the local cluster so it runs anywhere; for a true multi-cluster setup, add a
  # destination entry per registered cluster (e.g. cluster-1, cluster-2).
  destinations:
  - name: in-cluster
    namespace: '*'
  clusterResourceWhitelist:
  - group: ''
    kind: Namespace
  namespaceResourceWhitelist:
  - group: '*'
    kind: '*'
