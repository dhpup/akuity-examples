apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: project-quickstart
spec:
  # Bootstrap runs in the built-in `default` project; it deploys the
  # `project-quickstart-demo` AppProject (argocd/projects/) that scaffolded
  # project app-of-apps are created under.
  project: default
  syncPolicy:
    automated:
      prune: true
      allowEmpty: true
  source:
    repoURL: https://github.com/dhpup/akuity-examples.git
    targetRevision: main
    path: project-quickstart/argocd
    directory:
      recurse: true
  destination:
    name: in-cluster
    namespace: argocd
